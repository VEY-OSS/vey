version: 2.1

orbs:
  rust: circleci/rust@1.8.0
  cloudsmith: cloudsmith/cloudsmith@2.0.0

parameters:
  package:
    type: string
    default: vey-mkcert
  version:
    type: string
    default: 0.0.1

jobs:
  build-source-tar:
    docker:
      - image: debian:trixie
    resource_class: medium
    steps:
      - run: apt-get update
      - run:
          name: Install tools
          command: apt-get install -y curl git
      - rust/install:
          version: stable
      - run:
          name: Install package tools
          command: |
            apt-get install -y jq gcc capnproto xz-utils
            apt-get install -y python3-sphinx python3-sphinx-rtd-theme python3-toml
      - run:
          name: Checkout git repo
          command: |
            git clone -b << pipeline.git.branch >> << pipeline.project.git_url >> vey
      - run:
          name: Build source tarball
          environment:
            NO_CARGO_CACHE_CLEAN: yes
          working_directory: vey
          command: |
            ./scripts/release/build_tarball.sh << pipeline.parameters.package >>-v<< pipeline.parameters.version >>
      - save_cache:
          name: Cache source tarball
          key: << pipeline.parameters.package >>-<< pipeline.parameters.version >>-{{ .Revision }}.tar.xz
          paths:
            - "vey/<< pipeline.parameters.package >>-<< pipeline.parameters.version >>.tar.xz"
  build-deb:
    parameters:
      image:
        type: string
      class:
        type: string
    docker:
      - image: << parameters.image >>
    resource_class: << parameters.class >>
    steps:
      - run: apt-get update
      - run:
          name: Install tools
          command: apt-get install -y curl git
      - rust/install:
          version: stable
      - run:
          name: Install package tools
          command: apt-get install -y jq lsb-release dpkg-dev debhelper
      - run:
          name: Install dev tools and libs
          environment:
            DEBIAN_FRONTEND: noninteractive
          command: |
            apt-get install -y pkgconf cmake capnproto
            apt-get install -y libssl-dev libc-ares-dev
            apt-get install -y python3-dev liblua5.4-dev
      - restore_cache:
          name: Restore source tarball
          keys:
            - << pipeline.parameters.package >>-<< pipeline.parameters.version >>-{{ .Revision }}.tar.xz
      - run:
          name: Extract source code
          working_directory: vey
          command: tar xf << pipeline.parameters.package >>-<< pipeline.parameters.version >>.tar.xz
      - run:
          name: Build package
          working_directory: vey/<< pipeline.parameters.package >>-<< pipeline.parameters.version >>
          command: ./scripts/build_deb_from_tar.sh
          no_output_timeout: 15m
      - run:
          name: Create output dir
          working_directory: vey
          command: |
            mkdir DEBS
            mv << pipeline.parameters.package >>_<< pipeline.parameters.version >>-* DEBS
      - store_artifacts:
          path: vey/DEBS
      - cloudsmith/ensure-api-key
      - cloudsmith/install-cli
      - run:
          name: Upload package to cloudsmith
          working_directory: vey
          command: |
            source /etc/os-release
            cloudsmith push deb vey-oss/rolling/${ID}/${VERSION_CODENAME} DEBS/<< pipeline.parameters.package >>_<< pipeline.parameters.version >>-*.deb
  build-rpm-dnf:
    parameters:
      image:
        type: string
      class:
        type: string
    docker:
      - image: << parameters.image >>
    resource_class: << parameters.class >>
    steps:
      - rust/install:
          version: stable
      - run:
          name: Install package tools
          command: dnf install -y git jq rpmdevtools rpm-build
      - run:
          name: Install dev tools and libs
          command: |
            dnf install -y epel-release
            dnf config-manager --set-enabled devel
            dnf install -y pkgconf gcc make cmake
            dnf install -y openssl-devel c-ares-devel
            dnf install -y python3-devel lua-devel
      - when:
          condition:
            equal: [ "rockylinux/rockylinux:9", << parameters.image >> ] # python3,9
          steps:
            - run:
                name: Install python 3.12
                command: |
                  dnf install -y python3.12 python3.12-devel
                  update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
      - restore_cache:
          name: Restore source tarball
          keys:
            - << pipeline.parameters.package >>-<< pipeline.parameters.version >>-{{ .Revision }}.tar.xz
      - run:
          name: Build package
          environment:
            VEY_CAPNP_USE_PRECOMPILED: yes
          working_directory: vey
          command: rpmbuild -ta << pipeline.parameters.package >>-<< pipeline.parameters.version >>.tar.xz
          no_output_timeout: 15m
      - store_artifacts:
          path: ~/rpmbuild/RPMS
      - cloudsmith/ensure-api-key
      - cloudsmith/install-cli
      - run:
          name: Upload package to cloudsmith
          command: |
            VERSION=$(rpm --eval "%{dist}" | sed 's/[.]el\(.*\)/\1/')
            RPM_ARCH=$(rpm --eval "%{_arch}")
            cloudsmith push rpm vey-oss/rolling/el/$VERSION ~/rpmbuild/RPMS/${RPM_ARCH}/<< pipeline.parameters.package >>-<< pipeline.parameters.version >>-*.rpm
  build-rpm-zypper:
    parameters:
      image:
        type: string
      class:
        type: string
    docker:
      - image: << parameters.image >>
    resource_class: << parameters.class >>
    steps:
      - rust/install:
          version: stable
      - run:
          name: Install package tools
          command: zypper install -y git jq rpmdevtools rpm-build
      - run:
          name: Install dev tools and libs
          command: |
            zypper install -y pkgconf gcc make cmake
            zypper install -y openssl-devel c-ares-devel
            zypper install -y python3-devel lua-devel
      - when:
          condition:
            equal: [ "opensuse/leap:15.6", << parameters.image >> ] # python3.6
          steps:
            - run:
                name: Install python 3.12
                command: |
                  zypper install -y python312 python312-devel
                  update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
      - restore_cache:
          name: Restore source tarball
          keys:
            - << pipeline.parameters.package >>-<< pipeline.parameters.version >>-{{ .Revision }}.tar.xz
      - run:
          name: Build package
          environment:
            VEY_CAPNP_USE_PRECOMPILED: yes
          working_directory: vey
          command: rpmbuild -ta << pipeline.parameters.package >>-<< pipeline.parameters.version >>.tar.xz
          no_output_timeout: 15m
      - store_artifacts:
          path: /usr/src/packages/RPMS
      - cloudsmith/ensure-api-key
      - cloudsmith/install-cli
      - run:
          name: Upload package to cloudsmith
          command: |
            source /etc/os-release
            RPM_ARCH=$(rpm --eval "%{_arch}")
            cloudsmith push rpm vey-oss/rolling/opensuse/$VERSION /usr/src/packages/RPMS/${RPM_ARCH}/<< pipeline.parameters.package >>-<< pipeline.parameters.version >>-*.rpm

workflows:
  build-package:
    jobs:
      - build-source-tar
      - build-deb:
          requires:
            - build-source-tar
          matrix:
            parameters:
              class:
                - large
                - arm.medium
              image:
                - debian:trixie
                - debian:bookworm
                - ubuntu:24.04
                - ubuntu:22.04
      - build-rpm-dnf:
          requires:
            - build-source-tar
          matrix:
            parameters:
              class:
                - large
                - arm.medium
              image:
                - rockylinux/rockylinux:10
                - rockylinux/rockylinux:9
      - build-rpm-zypper:
          requires:
            - build-source-tar
          matrix:
            parameters:
              class:
                - large
                - arm.medium
              image:
                - opensuse/leap:16.0
                - opensuse/leap:15.6
