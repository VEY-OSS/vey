---

- name: Apply proxy sysctl config
  ansible.builtin.command:
    cmd: sysctl -p /etc/sysctl.d/99-proxy.conf
  register: apply
  changed_when: apply.rc == 0

- name: Dearmor VEY apt gpg key
  ansible.builtin.shell:
    cmd: cat /etc/apt/keyrings/vey.gpg.ascii | gpg --dearmor -o /etc/apt/keyrings/vey.gpg
  register: dearmor
  changed_when: dearmor.rc == 0
