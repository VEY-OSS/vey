
# reserve some ports that:
#   - banned by network acls
#   - reserved for apps
# doc: Documentation/networking/ip-sysctl.rst
net.ipv4.ip_local_reserved_ports = 11211

net.ipv4.tcp_fin_timeout = 15
# enable the kernel to reuse sockets in the TIME_WAIT state for new outbound connections
net.ipv4.tcp_tw_reuse = 1
# limit the number of sockets that can be in the TIME_WAIT state at the same time
net.ipv4.tcp_max_tw_buckets = 6000000

{% if sysctl_tcc_use_bbr is defined and sysctl_tcc_use_bbr|bool %}
#
# set tcp congestion control algo to bbr
#
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = fq
{% endif %}

# increase the system level max value of nr_open,
# so we can increase nofile of the process
fs.nr_open = 10485760
# fs.file-max

# listen backlog
net.core.somaxconn = 16384
# the maximum size of the receive queue for each network interface
net.core.netdev_max_backlog = 16384
# the maximum number of remembered connection requests that haven't received an acknowledgment
net.ipv4.tcp_max_syn_backlog = 65535

# socket buffer
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
# net.ipv4.tcp_mem
net.ipv4.tcp_rmem = 4096 65536 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
# net.ipv4.udp_mem

#
# TCP Keepalive
#
# the initial idle time
net.ipv4.tcp_keepalive_time = 600
# the interval between probes
net.ipv4.tcp_keepalive_intvl = 60
# the number of probes
net.ipv4.tcp_keepalive_probes = 9

# Disable the gradual speed increase that's useful
# on variable-speed WANs but not for us
net.ipv4.tcp_slow_start_after_idle = 0

# tcp_migrate_req = 1
