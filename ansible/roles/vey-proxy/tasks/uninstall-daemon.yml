---

- name: User confirmation
  ansible.builtin.pause:
    prompt: "This will uninstall vey-proxy@{{ daemon_group }}, continue (yes/no)?"
  register: uninstall_confirm
  run_once: true
  delegate_to: localhost

- name: Cancel?
  ansible.builtin.fail:
    msg: "User has cancelled uninstall of vey-proxy@{{ daemon_group }}"
  when: uninstall_confirm.user_input != "yes"

- name: "Stop and disable service vey-proxy@{{ daemon_group }}"
  ansible.builtin.systemd:
    name: "vey-proxy@{{ daemon_group }}"
    state: stopped
    enabled: false

- name: Clean config
  ansible.builtin.include_tasks: clean-config.yml
