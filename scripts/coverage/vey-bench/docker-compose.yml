services:
  httpbin:
    image: ghcr.io/psf/httpbin:0.10.2
    container_name: vey-bench-httpbin
    ports:
      - "127.0.0.1:80:8080"
    restart: always

  influxdb:
    image: influxdb:3-core
    container_name: vey-bench-influxdb
    environment:
      INFLUXDB3_NODE_IDENTIFIER_PREFIX: local
      INFLUXDB3_OBJECT_STORE: memory
    ports:
      - "127.0.0.1:8181:8181"
    restart: always

  graphite:
    image: graphiteapp/graphite-statsd:latest
    container_name: vey-bench-graphite
    ports:
      - "127.0.0.1:2003:2003"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: vey-bench-nginx
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./httpbin.local.pem:/etc/nginx/httpbin.local.pem:ro
      - ./httpbin.local-key.pem:/etc/nginx/httpbin.local-key.pem:ro
    restart: always
