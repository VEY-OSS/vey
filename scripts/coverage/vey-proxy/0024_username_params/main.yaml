---

log: stdout

stat:
  target:
    udp: 127.0.0.1:8125

resolver:
  - name: cares1
    type: c-ares
    server: 127.0.0.1

escaper:
  - name: default
    type: direct_fixed
    resolver: cares1
    egress_net_filter:
      default: allow
      allow: 127.0.0.1
  # Chaining via HTTP proxy; per-connection next-hop overridden by username params
  - name: comply_chained_http
    type: comply_context
    next: chained_http
    use_egress_upstream:
      escaper: chained_http
      default_port: 8080
      host_key: host
      domain_suffix: local
      resolve_sticky_key: session-id
  - name: chained_http
    type: proxy_http
    resolver: cares1
    # placeholder; overridden when username params are present
    proxy_addr: 127.0.0.1:3128
  # Chaining via SOCKS5 proxy; per-connection next-hop overridden by username params
  - name: comply_chained_socks
    type: comply_context
    next: chained_socks
    use_egress_upstream:
      - escaper: chained_socks
        default_port: 1080
        host_key: host
        domain_suffix: local
        resolve_sticky_key: session-id
  - name: chained_socks
    type: proxy_socks5
    resolver: cares1
    # placeholder; overridden when username params are present
    proxy_addr: 127.0.0.1:1080

user-group:
  - name: default
    static_users:
      - name: user
        token:
          salt: 4e8f8a4e37f0fa1b
          md5: d9d963915b9815d4cc39c196c2868900
          sha1: c28640e7b1a3d9db98187632aeba99c0cff0ffd4

server:
  - name: internal_socks
    type: socks_proxy
    listen: 127.0.0.1:1080
    escaper: default
  - name: internal_http
    type: http_proxy
    listen: 127.0.0.1:8080
    escaper: default
  - name: http
    type: http_proxy
    listen: 127.0.0.1:7080
    escaper: comply_chained_http
    user-group: default
    # exercise username params mapping in HTTP pipeline
    username_params:
      required_keys: host
      optional_keys: session-id
      param_separator: '_'
  - name: socks
    type: socks_proxy
    listen: 127.0.0.1:1081
    escaper: comply_chained_socks
    user-group: default
    enable_udp_associate: true
    # exercise username params mapping in SOCKS negotiation
    username_params:
      required_keys: host
      optional_keys: session-id
      param_separator: '_'
