services:
  ftp-server:
    image: bogem/ftp:latest
    container_name: vey-proxy-ftp
    environment:
      FTP_USER: ftpuser
      FTP_PASS: ftppass
      PASV_ADDRESS: 127.0.0.1
    ports:
      - "127.0.0.1:20-21:20-21/tcp"
      - "127.0.0.1:47400-47470:47400-47470/tcp"
    volumes:
      - /tmp/vsftpd:/home/vsftpd
    restart: always

  httpbin:
    image: ghcr.io/psf/httpbin:0.10.2
    container_name: vey-proxy-httpbin
    ports:
      - "127.0.0.1:80:8080"
    restart: always

  influxdb:
    image: influxdb:3-core
    container_name: vey-proxy-influxdb
    environment:
      INFLUXDB3_NODE_IDENTIFIER_PREFIX: local
      INFLUXDB3_OBJECT_STORE: memory
    ports:
      - "127.0.0.1:8181:8181"
    restart: always

  graphite:
    image: graphiteapp/graphite-statsd:latest
    container_name: vey-proxy-graphite
    ports:
      - "127.0.0.1:2003:2003"
    restart: always

  fluent-bit:
    image: ghcr.io/fluent/fluent-bit
    container_name: vey-proxy-fluent-bit
    ports:
      - "127.0.0.1:24224:24224"
    volumes:
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro

  glauth:
    image: ghcr.io/glauth/glauth:latest
    container_name: vey-proxy-glauth
    ports:
      - "127.0.0.1:3893:3893"
      - "127.0.0.1:6363:6363"
    volumes:
      - ./glauth.cfg:/app/config/config.cfg:ro
      - ./vey-proxy.local.pem:/app/config/vey-proxy.local.pem:ro
      - ./vey-proxy.local-key.pem:/app/config/vey-proxy.local-key.pem:ro

  nginx:
    image: nginx:alpine
    container_name: vey-proxy-nginx
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./httpbin.local.pem:/etc/nginx/httpbin.local.pem:ro
      - ./httpbin.local-key.pem:/etc/nginx/httpbin.local-key.pem:ro
    restart: always
