---
runtime:
  thread_number: 2

controller:
  local:
    recv_timeout: 30
    send_timeout: 1

server:
  - name: server_direct
    escaper: direct
    type: socks_proxy
    listen:
      address: "[::]:10087"
    tcp_sock_speed_limit: 100M
  - name: server_http_direct
    escaper: direct
    type: http_proxy
    listen:
      address: "127.0.0.1:8080"
  - name: server_socks1
    escaper: socks5
    type: socks_proxy
    listen:
      address: "[::]:10086"
  - name: server_socks2
    escaper: http
    type: socks_proxy
    listen: "[::]:10088"

resolver:
  - name: default
    type: c-ares

escaper:
  - name: direct
    type: direct_fixed
    no_ipv6: true
    resolver: default
    resolve_strategy: IPv4Only
    tcp_sock_speed_limit: 80M
    udp_sock_speed_limit: 10M
  - name: http
    type: proxy_http
    proxy_addr: "127.0.0.1:8080"
  - name: socks5
    type: proxy_socks5
    proxy_addr: 127.0.0.1:10087
    no_ipv6: true
    resolver: default
    resolve_strategy: IPv4Only
    tcp_sock_speed_limit: 80M
